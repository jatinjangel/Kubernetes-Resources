apiVersion: apps/v1
kind: ReplicaSet
metadata:
  name: frontend-rs
spec:
  replicas: 3
  selector:
    matchLabels:
      app: frontend
    matchExpressions:
    - key: tier
      operator: In
      values: [web, api]
  template:
    metadata:
      labels:
        app: frontend
        tier: web
    spec:
      containers:
      - name: app
        image: myapp:v2
        resources:
          requests: {cpu: "250m", memory: "64Mi"}
          limits:  {cpu: "500m", memory: "128Mi"}
